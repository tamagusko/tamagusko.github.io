{%- assign p = site.data.person -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": {{ p.name | jsonify }},
  "jobTitle": {{ p.job_title | jsonify }},
  "description": {{ p.description | strip_newlines | strip | jsonify }},
  "url": {{ p.url | jsonify }},
  "email": {{ p.email | prepend: "mailto:" | jsonify }},
  "affiliation": {
    "@type": "Organization",
    "name": {{ p.affiliation.name | jsonify }},
    "url": {{ p.affiliation.url | jsonify }}
  },
  "alumniOf": [
    {%- for org in p.alumni_of -%}
    {
      "@type": "CollegeOrUniversity",
      "name": {{ org.name | jsonify }},
      "url": {{ org.url | jsonify }}
    }{%- unless forloop.last -%},{%- endunless -%}
    {%- endfor -%}
  ],
  "knowsAbout": {{ p.knows_about | jsonify }},
  "sameAs": {{ p.same_as | jsonify }}
}
</script>
