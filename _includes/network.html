<figure class="network" aria-hidden="true">
  <svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img">
    <title>Research network</title>

    <!-- Edges (hairline connections) -->
    <g class="net-edges" fill="none" stroke="currentColor" stroke-width="0.6" stroke-linecap="round">
      <!-- Americas cluster -->
      <line x1="120" y1="160" x2="155" y2="195"/>
      <line x1="120" y1="160" x2="100" y2="120"/>
      <line x1="155" y1="195" x2="190" y2="220"/>
      <line x1="100" y1="120" x2="155" y2="100"/>
      <line x1="155" y1="100" x2="200" y2="135"/>
      <line x1="200" y1="135" x2="155" y2="195"/>
      <line x1="190" y1="220" x2="240" y2="240"/>
      <line x1="240" y1="240" x2="200" y2="135"/>
      <!-- Atlantic bridge -->
      <line x1="200" y1="135" x2="345" y2="115"/>
      <line x1="240" y1="240" x2="360" y2="180"/>
      <!-- Europe cluster -->
      <line x1="345" y1="115" x2="380" y2="95"/>
      <line x1="345" y1="115" x2="395" y2="135"/>
      <line x1="380" y1="95" x2="425" y2="105"/>
      <line x1="395" y1="135" x2="430" y2="150"/>
      <line x1="425" y1="105" x2="430" y2="150"/>
      <line x1="430" y1="150" x2="395" y2="180"/>
      <line x1="395" y1="180" x2="360" y2="180"/>
      <line x1="360" y1="180" x2="345" y2="115"/>
      <line x1="395" y1="180" x2="425" y2="105"/>
      <line x1="395" y1="135" x2="380" y2="95"/>
      <!-- Mediterranean / Africa -->
      <line x1="430" y1="150" x2="455" y2="200"/>
      <line x1="455" y1="200" x2="420" y2="240"/>
      <line x1="420" y1="240" x2="395" y2="180"/>
      <!-- Europe to Asia -->
      <line x1="430" y1="150" x2="525" y2="135"/>
      <line x1="425" y1="105" x2="525" y2="135"/>
      <line x1="525" y1="135" x2="575" y2="115"/>
      <line x1="525" y1="135" x2="580" y2="155"/>
      <line x1="575" y1="115" x2="625" y2="135"/>
      <line x1="580" y1="155" x2="625" y2="135"/>
      <line x1="625" y1="135" x2="675" y2="155"/>
      <line x1="675" y1="155" x2="700" y2="120"/>
      <line x1="700" y1="120" x2="625" y2="135"/>
      <!-- Asia south -->
      <line x1="580" y1="155" x2="610" y2="200"/>
      <line x1="610" y1="200" x2="660" y2="220"/>
      <line x1="660" y1="220" x2="675" y2="155"/>
      <line x1="610" y1="200" x2="675" y2="155"/>
    </g>

    <!-- Nodes -->
    <g class="net-nodes" fill="currentColor">
      <circle cx="120" cy="160" r="2.4"/>
      <circle cx="100" cy="120" r="2"/>
      <circle cx="155" cy="100" r="2"/>
      <circle cx="155" cy="195" r="2.4"/>
      <circle cx="190" cy="220" r="2"/>
      <circle cx="200" cy="135" r="2.6"/>
      <circle cx="240" cy="240" r="2"/>
      <circle cx="345" cy="115" r="2.4"/>
      <circle cx="380" cy="95"  r="2"/>
      <circle cx="425" cy="105" r="2"/>
      <circle cx="395" cy="135" r="2.4"/>
      <circle cx="430" cy="150" r="2.6"/>
      <circle cx="395" cy="180" r="2"/>
      <circle cx="360" cy="180" r="2"/>
      <circle cx="455" cy="200" r="2"/>
      <circle cx="420" cy="240" r="2"/>
      <circle cx="525" cy="135" r="2.4"/>
      <circle cx="575" cy="115" r="2"/>
      <circle cx="580" cy="155" r="2"/>
      <circle cx="625" cy="135" r="2.4"/>
      <circle cx="675" cy="155" r="2"/>
      <circle cx="700" cy="120" r="2"/>
      <circle cx="610" cy="200" r="2"/>
      <circle cx="660" cy="220" r="2"/>
    </g>

    <!-- Pulse highlights on a few nodes -->
    <g class="net-pulses" fill="none" stroke="currentColor" stroke-width="0.6">
      <circle cx="200" cy="135" r="2.6" class="pulse"/>
      <circle cx="430" cy="150" r="2.6" class="pulse" style="animation-delay: 1.2s"/>
      <circle cx="625" cy="135" r="2.4" class="pulse" style="animation-delay: 2.4s"/>
    </g>
  </svg>
</figure>
