---
layout: default
---

<h1 class="page-title">{{ page.title }}</h1>

<ul class="project-list">
  {%- for post in site.posts -%}
    <li>
      <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="tag">{{ post.category }}</span>
    </li>
  {%- endfor -%}
</ul>
